spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.port=${PORT:8080}
spring.web.resources.static-locations=classpath:/static/

# MySQL DataSource Configuration
# Locally uses hardcoded values; on Railway uses injected env vars from MySQL plugin
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:movie_booking_system}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Bat@123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Auto-initialize schema on startup (creates tables + seeds data if missing)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
